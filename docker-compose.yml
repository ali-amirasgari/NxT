services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nxt}
      POSTGRES_USER: ${POSTGRES_USER:-nxt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nxt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nxt} -d ${POSTGRES_DB:-nxt}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chat-db:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-chat-app}
    ports:
      - "${CHAT_DB_PORT:-27017}:27017"
    volumes:
      - chat_db_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      POSTGRES_DB: ${POSTGRES_DB:-nxt}
      POSTGRES_USER: ${POSTGRES_USER:-nxt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nxt}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/auth/csrf/')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  chat-service:
    build:
      context: ./chat-service
    command: sh -c "npm install && npm start"
    environment:
      PORT: ${CHAT_SERVICE_PORT_INTERNAL:-3000}
      MONGO_URI: ${CHAT_MONGO_URI:-mongodb://chat-db:27017/chat-app}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://backend:8000}
      CHAT_CORS_ORIGINS: ${CHAT_CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./chat-service:/app
      - chat_service_node_modules:/app/node_modules
    ports:
      - "${CHAT_SERVICE_PORT:-8002}:3000"
    depends_on:
      chat-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: ./ai-service
    restart: unless-stopped
    volumes:
      - ./ai-service/app:/app/app
    ports:
      - "${AI_SERVICE_PORT:-8001}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    environment:
      NEXT_PUBLIC_APP_MODE: ${NEXT_PUBLIC_APP_MODE:-dev}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL_DEV: ${NEXT_PUBLIC_API_BASE_URL_DEV:-http://backend:8000}
      NEXT_PUBLIC_AI_SERVICE_URL: ${NEXT_PUBLIC_AI_SERVICE_URL:-http://localhost:8001}
      NEXT_PUBLIC_CHAT_SOCKET_URL: ${NEXT_PUBLIC_CHAT_SOCKET_URL:-http://localhost:8002}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  chat_db_data:
  frontend_node_modules:
  frontend_next:
  chat_service_node_modules:
