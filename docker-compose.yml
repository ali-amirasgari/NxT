services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nxt}
      POSTGRES_USER: ${POSTGRES_USER:-nxt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nxt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nxt} -d ${POSTGRES_DB:-nxt}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      POSTGRES_DB: ${POSTGRES_DB:-nxt}
      POSTGRES_USER: ${POSTGRES_USER:-nxt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nxt}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build:
      context: ./ai-service
    volumes:
      - ./ai-service/app:/app/app
    ports:
      - "${AI_SERVICE_PORT:-8001}:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_AI_SERVICE_URL: ${NEXT_PUBLIC_AI_SERVICE_URL:-http://localhost:8001}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
      - ai-service

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
